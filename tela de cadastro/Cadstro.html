<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro-Pet</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fb;
        }
        
        /* TOPO */
        .topbar {
            background: #3f4c8b;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
        }
        
        /* CONTEÚDO */
        .wrapper {
            max-width: 1000px;
            margin: 40px auto;
        }
        
        /* CABEÇALHO */
        .page-header {
            margin-bottom: 20px;
        }
        
        .breadcrumb {
            color: #6c757d;
            font-size: 14px;
        }
        
        .page-header h1 {
            margin: 5px 0;
            color: #2c3e70;
        }
        
        .page-header p {
            color: #6c757d;
        }
        
        /* CARD */
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        /* TÍTULO SEÇÃO */
        .section-title {
            color: #2c3e70;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        /* INPUTS */
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        
        /* CAMPOS GRANDES */
        .full {
            grid-column: span 2;
        }
        
        /* UPLOAD */
        .upload {
            border: 2px dashed #ccc;
            padding: 25px;
            text-align: center;
            color: #777;
            border-radius: 8px;
        }
        
        /* BOTÕES */
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        
        .btn-cancel {
            border: 1px solid #3f4c8b;
            background: white;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .btn-save {
            background: #3f4c8b;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        /* RESPONSIVO */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        
            .full {
                grid-column: span 1;
            }
        }
        
        /* LABEL ESCONDIDO */
        .hidden-label {
            display: none;
        }
        </style>
</head>


<body>
    <div class="topbar">
        <div>Programa ARCA</div>
        <div>Início &nbsp;&nbsp; Perfil &nbsp;&nbsp; Ajuda</div>
    </div>
    
    <div class="wrapper">
    
        <div class="page-header">
            <div class="breadcrumb">SERVIÇOS / CADASTRO</div>
            <h1>Cadastro de Pet</h1>
            <p>Cadastre seu pet no sistema do Programa ARCA</p>
        </div>
    
        <div class="card">
    
            <div class="section-title">Informações do pet</div>
    
            <!-- LABEL ESCONDIDO -->
            <label class="hidden-label">SISTEMA WEB</label>
    
            <div class="grid">
    
                <input type="text" placeholder="Nome do Pet">
    
                <select>
                    <option>Selecione Espécie</option>
                    <option>Cachorro</option>
                    <option>Gato</option>
                </select>
    
                <select>
                    <option>Selecione Raça</option>
                </select>
    
                <input type="text" placeholder="Ex: 2 anos">
    
                <select>
                    <option>Selecione Gênero</option>
                </select>
    
                <input type="text" placeholder="Digite a cor predominante">
    
                <input type="number" placeholder="Peso (kg)" class="full">
    
                <textarea placeholder="Observações" class="full"></textarea>
    
                <div class="upload full">
                    Clique ou arraste um arquivo
                </div>
    
            </div>
    
            <div class="buttons">
                <button class="btn-cancel">Cancelar</button>
                <button class="btn-save">Salvar</button>
            </div>
    
        </div>
    
    </div>
    
</body>
</html>
