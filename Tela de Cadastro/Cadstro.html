<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro-Pet</title>
   
    <link rel="stylesheet" href="./Cadastro_style.css">

</head>


<body>
    <div class="topo">

    <div class="logo">
        Programa ARCA
    </div>

    <div class="menu">
        <a href="">Início</a>
        <a href="">Perfil</a>
        <a href="">Ajuda</a>
    </div>

</div>
    
    <div class="conteúdo">
    
        <div class="cabeçalho">
            <div class="breadcrumb">SERVIÇOS / CADASTRO</div>
            <div class="titulo_h1"> <h1>Cadastro de Pet</h1> </div>
            <div class="subtitulo_p"><p>Cadastre seu pet no sistema do Programa ARCA</p> </div>
        </div>
    
        <div class="card">
    
            <div class="título_seção">Informações do pet</div>
    
            <div class="grid">
    
                <input type="text" placeholder="Nome do Pet">
    
                <select>
                    <option>Selecione Espécie</option>
                    <option>Cachorro</option>
                    <option>Gato</option>
                </select>
    
                <select>
                    <option>Selecione Raça</option>
                </select>
    
                <input type="text" placeholder="Ex: 2 anos">
    
                <select>
                    <option>Selecione Gênero</option>
                </select>
    
                <input type="text" placeholder="Digite a cor predominante">
    
                <input type="number" placeholder="Peso (kg)" class="full">
    
                <textarea placeholder="Observações" class="full"></textarea>
    
                <div class="upload full">
               <input type="file">
                </div>
    
            </div>
    
            <div class="botões">
                <button class="btn-cancel">Cancelar</button>
                <button class="btn-save">Salvar</button>
            </div>
    
        </div>
    
    </div>
    <footer>
    © Copyright GroupTwo
</footer>
    
</body>
</html>
